name: .NET Desktop

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v5

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore Source/RatioMaster.sln

    - name: Build
      run: dotnet build Source/RatioMaster.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test Source/RatioMaster.sln --no-build --configuration Release --verbosity normal
